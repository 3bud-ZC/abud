<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="95" fill="none" stroke="url(#border)" stroke-width="3"/>
  <!-- Inner glow -->
  <ellipse cx="256" cy="180" rx="200" ry="120" fill="#9333ea" fill-opacity="0.08"/>
  <!-- ABUD Text -->
  <text
    x="256"
    y="300"
    font-family="Arial Black, Arial, sans-serif"
    font-size="180"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#text)"
    letter-spacing="-8"
  >ABUD</text>
  <!-- Subtitle -->
  <text
    x="256"
    y="390"
    font-family="Arial, sans-serif"
    font-size="36"
    font-weight="400"
    text-anchor="middle"
    fill="#9333ea"
    fill-opacity="0.6"
    letter-spacing="12"
  >DIGITAL</text>
</svg>
