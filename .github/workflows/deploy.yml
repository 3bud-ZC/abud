name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/var/www/abud-platform"
            echo ">>> [1/6] الانتقال لمجلد المشروع..."
            cd $APP_DIR

            echo ">>> [2/6] تحديث الكود من GitHub..."
            git pull origin main

            echo ">>> [3/6] تثبيت الـ dependencies..."
            npm ci

            echo ">>> [4/6] توليد Prisma Client..."
            npx prisma generate

            echo ">>> [5/6] بناء المشروع..."
            npm run build

            echo ">>> [6/6] إعادة تشغيل PM2..."
            pm2 reload abud-platform || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "✅ تم النشر بنجاح على abud-platform.abud.fun!"
