name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_SITE_URL: "https://abud.fun"
          NEXT_TELEMETRY_DISABLED: "1"
          SKIP_ENV_VALIDATION: "1"

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/abdullah/abud-platform"
            echo ">>> [1/5] الانتقال لمجلد المشروع..."
            cd $APP_DIR

            echo ">>> [2/5] تحديث الكود من GitHub..."
            git pull origin main

            echo ">>> [3/5] تثبيت الـ dependencies..."
            npm ci --omit=dev

            echo ">>> [4/5] بناء المشروع..."
            npm run build

            echo ">>> [5/5] إعادة تشغيل PM2..."
            pm2 reload abud-platform || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "✅ تم النشر بنجاح!"
