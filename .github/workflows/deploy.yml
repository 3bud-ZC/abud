name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            if [ -d "/home/abdullah/abud" ]; then
              APP_DIR="/home/abdullah/abud"
            elif [ -d "/var/www/abud-platform" ]; then
              APP_DIR="/var/www/abud-platform"
            else
              echo "❌ لم يتم العثور على مسار المشروع المتوقع"
              exit 1
            fi

            if pm2 describe abud > /dev/null 2>&1; then
              PM2_APP="abud"
            elif pm2 describe abud-platform > /dev/null 2>&1; then
              PM2_APP="abud-platform"
            else
              PM2_APP="abud"
            fi

            echo ">>> [1/8] الانتقال لمجلد المشروع..."
            echo ">>> APP_DIR=$APP_DIR | PM2_APP=$PM2_APP"
            cd $APP_DIR

            echo ">>> [2/8] تحديث الكود من GitHub..."
            git pull origin main

            echo ">>> [3/8] تثبيت الـ dependencies..."
            npm ci

            echo ">>> [4/8] توليد Prisma Client..."
            npx prisma generate

            echo ">>> [5/8] تحديث قاعدة البيانات..."
            npx prisma db push

            echo ">>> [6/8] مزامنة بيانات الخدمات والمعرض..."
            npm run db:seed-services
            npm run db:seed-portfolio

            echo ">>> [7/8] بناء المشروع..."
            npm run build

            echo ">>> [8/8] إعادة تشغيل PM2..."
            pm2 reload "$PM2_APP" || pm2 start ecosystem.config.js --name "$PM2_APP" --env production
            pm2 save

            echo "✅ تم النشر بنجاح على المسار الفعلي"
