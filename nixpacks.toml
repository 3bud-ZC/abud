# Nixpacks Configuration for ABUD Platform
# Railway deployment configuration

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.build]
cmds = [
    "npm install",
    "npx prisma generate",
    "npm run build"
]

[phases.start]
cmds = ["npm start"]

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
