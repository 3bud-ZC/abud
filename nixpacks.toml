[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.build]
cmds = [
    "npm ci",
    "npx prisma generate",
    "NODE_OPTIONS='--max-old-space-size=6144' npm run build"
]

[phases.start]
cmds = ["npm start"]

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PRIVATE_SKIP_EDGE_USE = "1"
